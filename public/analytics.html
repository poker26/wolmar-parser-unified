<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аналитика — Begemot Numismatics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/assets/dark.js"></script>
<link rel="stylesheet" href="/assets/dark.css">
</head>
<body class="font-sans text-slate-200 min-h-screen antialiased">

<header id="site-header"></header>

<main class="max-w-7xl mx-auto px-5 py-8">
  <div class="flex items-center gap-2 mb-6">
    <span class="w-1.5 h-6 rounded-full bg-gradient-to-b from-gold-400 to-gold-600"></span>
    <h1 class="text-2xl font-extrabold text-white">Аналитика базы аукционов</h1>
  </div>

  <div id="kpis" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-8"></div>

  <div class="grid lg:grid-cols-2 gap-6">
    <div id="turnoverBlock"></div>
    <div id="volumeBlock"></div>
  </div>
</main>

<script>
const D = window.DARK;
const fmt = D.fmt, fmtNum = D.fmtNum, fmtDate = D.fmtDate;

function compactRub(n){
  if (n == null || isNaN(n)) return '—';
  const x = Number(n);
  if (x >= 1e9) return (x/1e9).toFixed(1).replace('.0','') + ' млрд ₽';
  if (x >= 1e6) return (x/1e6).toFixed(1).replace('.0','') + ' млн ₽';
  if (x >= 1e3) return Math.round(x/1e3) + ' тыс ₽';
  return Math.round(x) + ' ₽';
}

function stat(v, l, ic, tone){
  return `<div class="rounded-xl bg-ink-900/70 border border-ink-700 px-4 py-3">
    <div class="flex items-center gap-1.5 text-[11px] text-slate-500"><i data-lucide="${ic}" class="w-3.5 h-3.5"></i>${l}</div>
    <div class="text-xl font-bold mt-0.5 tnum ${tone||'text-white'}">${v}</div></div>`;
}

function barList(title, icon, rows, valueFmt, accent){
  const max = rows.length ? Math.max(...rows.map(r=>r.v||0)) || 1 : 1;
  const items = rows.length ? rows.map(r=>`
    <a href="/current.html?auction=${encodeURIComponent(r.key)}" class="block group">
      <div class="flex justify-between text-xs mb-1">
        <span class="text-slate-300 group-hover:text-white">Аукцион ${r.key}<span class="text-slate-600"> · ${r.sub||''}</span></span>
        <span class="font-mono tnum ${accent.txt}">${valueFmt(r.v)}</span>
      </div>
      <div class="h-2 rounded-full bg-ink-700 overflow-hidden"><div class="h-full ${accent.bar}" style="width:${Math.round((r.v||0)/max*100)}%"></div></div>
    </a>`).join('')
    : `<p class="text-sm text-slate-500">Нет данных.</p>`;
  return `<div class="rounded-2xl bg-ink-900/80 border border-ink-700 overflow-hidden">
    <div class="px-5 py-3 border-b border-ink-700 flex items-center gap-2 font-semibold text-white">
      <i data-lucide="${icon}" class="w-4 h-4 ${accent.txt}"></i>${title}
    </div>
    <div class="p-5 space-y-3">${items}</div>
  </div>`;
}

async function init(){
  const kpiEl = document.getElementById('kpis');
  kpiEl.innerHTML = Array.from({length:6}).map(()=>`<div class="h-20 skel rounded-xl"></div>`).join('');
  try {
    const [s, auctions] = await Promise.all([
      fetch('/api/statistics').then(r=>r.json()),
      fetch('/api/auctions').then(r=>r.ok?r.json():[]).catch(()=>[]),
    ]);

    const soldPct = s.total_lots ? Math.round(s.sold_lots / s.total_lots * 100) : 0;
    kpiEl.innerHTML = [
      stat(fmtNum(s.total_auctions), 'аукционов', 'layers'),
      stat(fmtNum(s.total_lots), 'лотов всего', 'coins'),
      stat(soldPct+'%', 'продано лотов', 'badge-check', soldPct>=50?'text-emerald-300':'text-white'),
      stat(compactRub(s.total_value), 'оборот всего', 'banknote', 'text-gold-300'),
      stat(fmt(s.avg_price), 'средняя цена', 'bar-chart-3'),
      stat(fmtNum(s.unique_participants), 'участников', 'users'),
    ].join('');

    const list = Array.isArray(auctions) ? auctions : [];
    // numeric auction number + has turnover
    const norm = list
      .map(a => ({
        key: a.auction_number,
        n: parseInt(a.auction_number, 10),
        value: Number(a.total_value) || 0,
        lots: Number(a.lots_count) || 0,
        date: a.end_date,
        vip: !!a.is_wolmar,
      }))
      .filter(a => !isNaN(a.n));

    const topTurnover = norm.slice().sort((x,y)=>y.value-x.value).slice(0,10)
      .map(a => ({ key:a.key, v:a.value, sub:`${fmtNum(a.lots)} лот.` }));
    const topVolume = norm.slice().sort((x,y)=>y.lots-x.lots).slice(0,10)
      .map(a => ({ key:a.key, v:a.lots, sub:fmtDate(a.date) }));

    document.getElementById('turnoverBlock').innerHTML =
      barList('Топ аукционов по обороту', 'flame', topTurnover, compactRub,
        { txt:'text-gold-300', bar:'bg-gradient-to-r from-gold-400 to-gold-600' });
    document.getElementById('volumeBlock').innerHTML =
      barList('Топ аукционов по числу лотов', 'package', topVolume, fmtNum,
        { txt:'text-sky-300', bar:'bg-gradient-to-r from-sky-400 to-indigo-500' });

    lucide.createIcons();
  } catch (e){
    kpiEl.innerHTML = `<div class="col-span-full text-center py-12 text-rose-300"><i data-lucide="alert-triangle" class="w-8 h-8 mx-auto mb-2"></i>Не удалось загрузить аналитику: ${e.message}</div>`;
    lucide.createIcons();
  }
}

D.mountHeader('analytics', 'аналитика');
init();
</script>
</body>
</html>
